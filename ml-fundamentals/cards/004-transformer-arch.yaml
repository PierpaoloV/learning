front: |
  Describe the full Transformer encoder block. What are its components and order?
back: |
  Each encoder layer has two sub-layers:
  1. Multi-Head Self-Attention (MHSA)
     - h parallel attention heads, each with its own Q/K/V projections
     - outputs concatenated and projected back
  2. Position-wise Feed-Forward Network (FFN)
     - Two linear layers with a ReLU/GELU in between
     - Applied independently to each position

  Each sub-layer is wrapped with:
  - Residual connection: x + sublayer(x)
  - Layer Normalization (Pre-LN in modern variants)

  Positional encodings are added to embeddings at the input to inject
  sequence order (sinusoidal or learned).
