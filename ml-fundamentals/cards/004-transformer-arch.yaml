front: 'Describe the full Transformer encoder block. What are its components and order?

  '
back: "Each encoder layer has two sub-layers:\n1. Multi-Head Self-Attention (MHSA)\n\
  \   - h parallel attention heads, each with its own Q/K/V projections\n   - outputs\
  \ concatenated and projected back\n2. Position-wise Feed-Forward Network (FFN)\n\
  \   - Two linear layers with a ReLU/GELU in between\n   - Applied independently\
  \ to each position\n\nEach sub-layer is wrapped with:\n- Residual connection: x\
  \ + sublayer(x)\n- Layer Normalization (Pre-LN in modern variants)\n\nPositional\
  \ encodings are added to embeddings at the input to inject\nsequence order (sinusoidal\
  \ or learned).\n"
interval: 1
