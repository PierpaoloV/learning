front: 'What is contrastive learning? How does SimCLR work?

  '
back: "Contrastive learning trains a model to produce similar embeddings for augmented\n\
  views of the same sample (positives) and dissimilar embeddings for different samples\
  \ (negatives).\nNo labels needed → self-supervised.\n\nSimCLR:\n1. Take image x\
  \ → apply two random augmentations → views x_i, x_j\n2. Encode both with a shared\
  \ CNN backbone f(·) → h_i, h_j\n3. Project to lower dim with MLP g(·) → z_i, z_j\n\
  4. Minimize NT-Xent loss: maximize cosine similarity of (z_i, z_j),\n   minimize\
  \ it vs all other samples in the batch (negatives)\n\nKey insight: large batch size\
  \ needed for enough negatives.\nSuccessor: MoCo uses a memory bank; BYOL/DINO remove\
  \ negatives entirely.\n\nPathology relevance: CONCH, UNI, PLIP are foundation models\
  \ trained with\ncontrastive learning on histopathology images + reports.\n"
