front: |
  Explain backpropagation. What is the chain rule's role?
back: |
  Backprop computes gradients of the loss w.r.t. every parameter by applying
  the chain rule backwards through the computational graph.

  For a composed function L = f(g(x)):
    dL/dx = (dL/df) · (df/dg) · (dg/dx)

  In a neural net, gradients flow from the output layer back to the input,
  accumulating products of local Jacobians at each operation.
  This is efficient because each intermediate gradient is computed once
  and reused (dynamic programming).
