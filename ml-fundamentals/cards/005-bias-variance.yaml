front: |
  What is the bias-variance tradeoff? How do you diagnose and fix each?
back: |
  Expected error = Bias² + Variance + Irreducible noise

  Bias: error from wrong assumptions (underfitting).
    Signs: high train error AND high val error.
    Fix: more complex model, more features, less regularization.

  Variance: sensitivity to training data fluctuations (overfitting).
    Signs: low train error, high val error (large gap).
    Fix: more data, regularization (L1/L2, dropout), simpler model, ensembling.

  The tradeoff: reducing bias often increases variance and vice versa.
  Deep learning partially breaks this with overparameterized models
  that generalize well (double-descent phenomenon).
