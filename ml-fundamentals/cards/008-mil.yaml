front: 'What is Multiple Instance Learning (MIL)? How is it applied to WSI analysis?

  '
back: "MIL: a weakly-supervised paradigm where labels are assigned to bags (groups),\n\
  not individual instances. A bag is positive if ≥1 instance is positive.\n\nIn WSI\
  \ analysis:\n- Bag = whole slide image (gigapixel, can't fit in GPU memory).\n-\
  \ Instances = patches (e.g. 256×256 at 20× magnification).\n- Label = slide-level\
  \ (e.g. cancer grade, subtype) — no patch annotations needed.\n\nCommon approaches:\n\
  - ABMIL (Attention-Based MIL): learns an attention score per patch;\n  aggregates\
  \ into slide embedding → classification head.\n- TransMIL: transformer encoder over\
  \ patch embeddings for spatial context.\n- CLAM: adds instance-level clustering\
  \ constraints for better interpretability.\n\nKey advantage: avoids expensive patch-level\
  \ annotation by pathologists.\n"
