front: |
  What is the vanishing gradient problem? How do modern architectures solve it?
back: |
  In deep networks, gradients are products of many Jacobians via chain rule.
  If weights are small (< 1), repeated multiplication → gradients shrink exponentially.
  Early layers receive near-zero gradients → they don't learn.

  Solutions:
  1. Residual connections (ResNet): x + F(x) — gradient highway, avoids multiplication chain.
  2. Careful initialization: Xavier/Glorot (tanh), He/Kaiming (ReLU) — keeps variance stable.
  3. Activation functions: ReLU has gradient 1 for positive inputs (no saturation).
     Problem: dying ReLU. Fix: LeakyReLU, GELU.
  4. Gradient clipping: caps gradient norm to prevent explosion (used in RNNs/transformers).
  5. BatchNorm / LayerNorm: normalizes activations, keeps them in healthy gradient regions.
