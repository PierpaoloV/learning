front: 'What is RAG (Retrieval-Augmented Generation)? What problem does it solve?

  '
back: "RAG combines a retriever and a generator:\n1. Retriever: given a query, fetch\
  \ top-k relevant chunks from a vector store\n   (via embedding similarity, e.g.\
  \ cosine over FAISS/Pinecone).\n2. Generator: LLM receives query + retrieved context\
  \ → produces grounded answer.\n\nProblem it solves:\n- LLMs have stale knowledge\
  \ (training cutoff) and hallucinate facts.\n- RAG grounds generation in up-to-date,\
  \ verifiable documents.\n- Cheaper than fine-tuning for knowledge updates.\n\nKey\
  \ failure modes:\n- Retrieval misses the relevant chunk (recall problem).\n- LLM\
  \ ignores retrieved context (faithfulness problem).\n- Chunk size / overlap affects\
  \ quality significantly.\n"
interval: 1
