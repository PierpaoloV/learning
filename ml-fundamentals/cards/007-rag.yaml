front: |
  What is RAG (Retrieval-Augmented Generation)? What problem does it solve?
back: |
  RAG combines a retriever and a generator:
  1. Retriever: given a query, fetch top-k relevant chunks from a vector store
     (via embedding similarity, e.g. cosine over FAISS/Pinecone).
  2. Generator: LLM receives query + retrieved context → produces grounded answer.

  Problem it solves:
  - LLMs have stale knowledge (training cutoff) and hallucinate facts.
  - RAG grounds generation in up-to-date, verifiable documents.
  - Cheaper than fine-tuning for knowledge updates.

  Key failure modes:
  - Retrieval misses the relevant chunk (recall problem).
  - LLM ignores retrieved context (faithfulness problem).
  - Chunk size / overlap affects quality significantly.
