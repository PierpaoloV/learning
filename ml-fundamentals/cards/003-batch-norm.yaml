front: |
  What does Batch Normalization do and why does it help training?
back: |
  BatchNorm normalizes each feature across the mini-batch to zero mean and
  unit variance, then applies learnable scale (γ) and shift (β):
    x̂ = (x − μ_B) / √(σ²_B + ε)
    y = γx̂ + β

  Benefits:
  - Reduces internal covariate shift → allows higher learning rates
  - Acts as mild regularizer (noise from batch statistics)
  - Smooths the loss landscape

  Caveat: behaves differently at train vs. inference (uses running stats at test time).
  Poor fit for small batches or sequence models → use LayerNorm instead.
