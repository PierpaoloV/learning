front: 'What does Batch Normalization do and why does it help training?

  '
back: "BatchNorm normalizes each feature across the mini-batch to zero mean and\n\
  unit variance, then applies learnable scale (γ) and shift (β):\n  x̂ = (x − μ_B)\
  \ / √(σ²_B + ε)\n  y = γx̂ + β\n\nBenefits:\n- Reduces internal covariate shift\
  \ → allows higher learning rates\n- Acts as mild regularizer (noise from batch statistics)\n\
  - Smooths the loss landscape\n\nCaveat: behaves differently at train vs. inference\
  \ (uses running stats at test time).\nPoor fit for small batches or sequence models\
  \ → use LayerNorm instead.\n"
interval: 1
