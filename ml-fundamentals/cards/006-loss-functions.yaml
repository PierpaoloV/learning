front: 'Compare Cross-Entropy, MSE, and Focal Loss. When do you use each?

  '
back: "Cross-Entropy (classification):\n  L = -Σ y·log(p)\n  Use when: standard classification;\
  \ well-calibrated probabilities.\n\nMSE (regression):\n  L = (y - ŷ)²\n  Use when:\
  \ continuous outputs; sensitive to outliers (use MAE if outliers present).\n\nFocal\
  \ Loss (imbalanced classification):\n  L = -α(1-p)^γ · log(p)\n  Downweights easy\
  \ examples (high confidence correct predictions).\n  Use when: severe class imbalance\
  \ (e.g. object detection, medical imaging).\n  γ=2 is standard; higher γ = more\
  \ focus on hard examples.\n\nDice Loss (segmentation):\n  L = 1 - 2|A∩B| / (|A|+|B|)\n\
  \  Use when: pixel-level binary segmentation with imbalanced foreground/background.\n"
