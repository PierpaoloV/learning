front: 'What is RLHF? Describe its three stages and main weaknesses.

  '
back: "RLHF (Reinforcement Learning from Human Feedback) aligns LLMs to human preferences.\n\
  \nStage 1 — Supervised Fine-Tuning (SFT):\n  Fine-tune pretrained LLM on high-quality\
  \ human demonstrations.\n\nStage 2 — Reward Model (RM):\n  Humans rank pairs of\
  \ model outputs. Train a regression model to predict\n  a scalar reward score from\
  \ (prompt, response).\n\nStage 3 — RL Fine-Tuning (PPO):\n  Use PPO to optimize\
  \ the LLM policy against the RM reward,\n  with a KL penalty to prevent diverging\
  \ from the SFT model.\n\nWeaknesses:\n- Reward hacking: model finds outputs that\
  \ fool the RM without being better.\n- Expensive: requires human annotators and\
  \ RL stability tricks.\n- RM overfitting: RM is imperfect proxy for true human preference.\n\
  \nModern alternative: DPO (Direct Preference Optimization) — skips RM,\noptimizes\
  \ preferences directly. Simpler and competitive with RLHF.\n"
interval: 1
