front: |
  Compare SGD, Adam, and AdamW. When would you choose each?
back: |
  SGD (+ momentum):
    Update: θ ← θ - lr · ∇L (+ momentum term)
    Pros: simple, generalizes well with tuning, standard for CV.
    Cons: sensitive to lr; requires careful scheduling.

  Adam:
    Adapts lr per parameter using first (m) and second (v) moment estimates.
    Update: θ ← θ - lr · m̂ / (√v̂ + ε)
    Pros: fast convergence, robust to lr choice.
    Cons: can overfit; weight decay is incorrect (decays adapted lr, not weights).

  AdamW:
    Fixes Adam's weight decay: applies decay directly to weights, not gradient.
    θ ← θ - lr · (m̂ / (√v̂ + ε) + λθ)
    Use when: transformers, LLMs — it's the default optimizer for most modern models.

  Rule of thumb: AdamW for transformers/LLMs; SGD+momentum for ResNets/CNNs.
