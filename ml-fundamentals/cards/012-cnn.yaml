front: 'What are the key properties of CNNs that make them suited to image data?

  '
back: "1. Local connectivity: each neuron connects only to a local region (receptive\
  \ field),\n   exploiting the locality of image features.\n\n2. Weight sharing: the\
  \ same filter is applied across all positions →\n   drastically fewer parameters\
  \ than FC layers.\n\n3. Translation equivariance: if the input shifts, the feature\
  \ map shifts by the same amount.\n   (Pooling adds approximate translation invariance.)\n\
  \n4. Hierarchical features: early layers detect edges/textures, deeper layers detect\n\
  \   objects/semantic concepts.\n\nParameter count of a conv layer:\n  (kernel_h\
  \ × kernel_w × in_channels + 1) × out_channels\n"
interval: 1
